# Lightweight docker-compose for the external services the project needs:
#   - PostgreSQL (used when DATABASE_URL is set to postgres://...)
#   - Redis      (Celery broker + result backend + Section 2 rate limiter)
#
# Usage:
#   docker-compose up -d redis db
#   pip install -r requirements.txt
#   python manage.py migrate
#   python manage.py runserver
#
# To run Section 2 end-to-end you also need a Celery worker in another shell:
#   celery -A config worker -l info

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: artikate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
